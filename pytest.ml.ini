# Pytest config for the `ml` CI job (medrisk_ml only - see .github/workflows/ci.yml).
#
# Deliberately separate from pyproject.toml's [tool.pytest.ini_options] (used by the `test`
# job): that config sets asyncio_mode/asyncio_default_*_loop_scope, which are option names
# contributed by the pytest-asyncio plugin. tests/ml has no async tests and the `ml` job's
# environment never installs pytest-asyncio, so reusing that config here would make pytest
# fail before any test runs (Unknown config option, escalated to a hard error by
# filterwarnings=error below).
[pytest]
minversion = 8.0
addopts = -ra --strict-markers
testpaths = tests/ml
filterwarnings =
    error
