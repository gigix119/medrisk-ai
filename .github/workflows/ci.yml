name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default (Phase 8): no job here pushes code, creates releases, or deploys,
# so none of them need anything beyond reading the checked-out source.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medrisk
          POSTGRES_PASSWORD: medrisk
          POSTGRES_DB: medrisk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medrisk -d medrisk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # ENVIRONMENT=test for the whole job: this makes both the explicit
      # alembic steps below AND pytest (which also forces this in
      # tests/conftest.py) resolve to the SAME database - TEST_DATABASE_URL,
      # i.e. medrisk_test. Nothing in this workflow needs the "development"
      # medrisk database, so it is created by the service container but
      # never migrated.
      ENVIRONMENT: test
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://medrisk:medrisk@localhost:5432/medrisk
      TEST_DATABASE_URL: postgresql+asyncpg://medrisk:medrisk@localhost:5432/medrisk_test
      POSTGRES_DB: medrisk
      POSTGRES_TEST_DB: medrisk_test
      POSTGRES_USER: medrisk
      POSTGRES_PASSWORD: medrisk
      POSTGRES_PORT: "5432"
      # CI-only value, not a real secret, just has to be non-empty in test mode.
      JWT_SECRET_KEY: ci-only-test-secret-never-used-outside-github-actions
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      JWT_ISSUER: medrisk-ai-ci
      JWT_AUDIENCE: medrisk-ai-ci-clients
      CORS_ORIGINS: ""
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      LOG_LEVEL: INFO

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-inference.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Create the test database
        env:
          PGPASSWORD: medrisk
        run: psql -h localhost -U medrisk -d medrisk -c "CREATE DATABASE medrisk_test;"

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Verify no pending model changes
        run: python -m alembic check

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: mypy
        run: python -m mypy app scripts medrisk_inference medrisk_research

      - name: pytest with coverage
        run: python -m pytest --cov=app --cov=medrisk_inference --cov=medrisk_research --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  ml:
    runs-on: ubuntu-latest
    # Independent of the `test` job: no PostgreSQL needed, CPU-only PyTorch, no real PCam
    # download (MEDRISK_ALLOW_DATA_DOWNLOAD is deliberately left unset). Every command below
    # runs against fully synthetic, generated data - see docs/dataset-card-pcam.md.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements-ml.txt
            requirements-ml-dev.txt

      - name: Install ML dependencies (CPU-only torch/torchvision + lint/type/test tools)
        run: |
          python -m pip install -r requirements-ml.txt -r requirements-ml-dev.txt
          python -m pip install ruff==0.7.4 mypy==1.13.0 pytest==8.4.2 pytest-cov==6.3.0

      - name: Ruff format check (ML code)
        run: python -m ruff format --check medrisk_ml scripts/ml tests/ml configs

      - name: Ruff lint (ML code)
        run: python -m ruff check medrisk_ml scripts/ml tests/ml

      - name: mypy (ML code)
        run: python -m mypy medrisk_ml

      - name: pytest (ML pipeline, synthetic data only)
        run: python -m pytest tests/ml --cov=medrisk_ml --cov-report=term-missing --cov-report=xml

      - name: Upload ML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ml-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Smoke training run (synthetic data - NOT a medical performance result)
        run: python -m medrisk_ml.cli train --config configs/ml/smoke.yaml

      - name: Resolve smoke experiment id
        id: smoke
        run: |
          experiment_id=$(ls -t artifacts/experiments | head -n 1)
          echo "Resolved experiment_id=$experiment_id"
          echo "experiment_id=$experiment_id" >> "$GITHUB_OUTPUT"

      - name: Smoke evaluation (val-only threshold/calibration, test run once)
        run: python -m medrisk_ml.cli evaluate --experiment-id ${{ steps.smoke.outputs.experiment_id }}

      - name: Smoke Grad-CAM explainability
        run: python -m medrisk_ml.cli explain --experiment-id ${{ steps.smoke.outputs.experiment_id }}

      - name: Register smoke model and build a portable bundle
        run: python -m medrisk_ml.cli register --experiment-id ${{ steps.smoke.outputs.experiment_id }} --version 0.0.1-ci

      - name: Verify the registered bundle (checksums + smoke inference)
        run: python -m medrisk_ml.cli verify-bundle --model-id smoke-baseline-cnn:0.0.1-ci

  frontend:
    runs-on: ubuntu-latest
    # Independent of `test`/`ml`: no Python, no Postgres - just the Vite/React app.

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit/component tests
        run: npm run test

      - name: Production build
        run: npm run build

  security:
    runs-on: ubuntu-latest
    # Awareness scanning, not a gate on correctness: known Python/JS dependency CVEs and
    # accidental secrets. Independent of `test`/`ml`/`frontend` - no Postgres, no torch.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install scanning tools
        run: python -m pip install pip-audit==2.10.1 detect-secrets==1.5.0

      - name: pip-audit - live API dependencies
        run: python -m pip_audit -r requirements.txt

      - name: pip-audit - inference dependencies
        # CVE-2025-3000 (torch) is a memory-corruption issue specific to torch.jit.script on
        # scripted classes with list attributes - this codebase never calls torch.jit.script
        # (see docs/SECURITY_AUDIT.md finding F-4). Ignored here, not silently unscanned.
        run: python -m pip_audit -r requirements-inference.txt --ignore-vuln CVE-2025-3000

      - name: pip-audit - ML pipeline dependencies
        run: python -m pip_audit -r requirements-ml.txt --ignore-vuln CVE-2025-3000

      - name: Secret scan (diff against the committed baseline)
        # Any *new* finding not already in .secrets.baseline updates the file on disk, which
        # the following step then catches as an uncommitted diff - this fails the job without
        # printing the secret value itself anywhere in the log.
        run: |
          detect-secrets scan \
            --exclude-files '\.venv/' \
            --exclude-files 'node_modules/' \
            --exclude-files 'frontend/dist/' \
            --exclude-files 'package-lock\.json' \
            --exclude-files 'frontend/openapi\.json' \
            --exclude-files 'frontend/src/api/generated/' \
            --baseline .secrets.baseline
          git diff --exit-code .secrets.baseline

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (locked)
        working-directory: frontend
        run: npm ci

      - name: npm audit - frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
