# Render Blueprint - see docs/DEPLOYMENT.md "Render deployment" for the full walkthrough,
# including why ENVIRONMENT=development (not "production") is used here. DATABASE_URL and
# JWT_SECRET_KEY are both provisioned automatically (see their envVars entries below) - no
# manual dashboard step is required to stand this up.
#
# This deploys the plain `Dockerfile` (no PyTorch/inference runtime, no model bundle) - the
# initial deployment has MODEL_REQUIRED=false and serves no real predictions. Switch to
# `Dockerfile.inference` and flip MODEL_REQUIRED/ALLOW_SYNTHETIC_MODEL once inference is
# actually wanted on the deployed instance.

databases:
  - name: medrisk-db
    databaseName: medrisk
    user: medrisk
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: medrisk-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health/live
    # Render injects $PORT; migrations run once per deploy before Uvicorn starts. This is
    # the same migrate-then-serve sequencing compose.yaml uses locally (see compose.yaml),
    # just without the wait_for_db/seed steps, which are local-dev-only conveniences.
    # A literal `sh -c "... && ..."` string here previously failed at startup (exit 127):
    # Render does not invoke a shell to parse dockerCommand, so the entire string - including
    # the `&&` - was looked up as a single executable name. scripts/render_start.sh sidesteps
    # this: Render executes it directly, and the explicit `/bin/sh` invocation below is what
    # actually provides the shell that runs the migration-then-serve sequence inside it.
    startCommand: /bin/sh scripts/render_start.sh
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: DEBUG
        value: "false"

      # --- Database ---
      # Render's managed-Postgres connectionString uses the postgresql:// scheme; the app
      # requires postgresql+asyncpg:// for SQLAlchemy's async driver.
      # normalize_database_url_scheme (app/core/config.py) rewrites it automatically at
      # startup, so this can be wired straight from the database below - no manual copy/edit
      # step, and no dependency on the database already existing when the Blueprint is first
      # created. See docs/DEPLOYMENT.md.
      - key: DATABASE_URL
        fromDatabase:
          name: medrisk-db
          property: connectionString
      # Required by Settings but only ever read when ENVIRONMENT=test, which this service
      # never runs as. A schema-valid placeholder, not a real reachable database.
      - key: TEST_DATABASE_URL
        value: postgresql+asyncpg://unused:unused@localhost:5432/medrisk_test_unused
      # Required by Settings (no default); wired automatically from the managed database
      # below so it always matches, even though the app itself never reads it at runtime.
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: medrisk-db
          property: password

      # --- JWT ---
      # No safe default exists outside of tests. Render generates and stores a random value
      # for this at Blueprint creation time (and never overwrites it on redeploy) - if that
      # value were ever too short or otherwise insecure,
      # Settings.validate_jwt_secret_strength fails startup loudly rather than accepting it
      # silently. To roll it manually instead, replace generateValue: true with sync: false
      # and paste a value generated via:
      #   python -c "import secrets; print(secrets.token_urlsafe(64))"
      - key: JWT_SECRET_KEY
        generateValue: true

      # --- CORS / hosts ---
      # ALLOWED_HOSTS (TrustedHostMiddleware) is this API's own Host header allowlist - the
      # default Render subdomain for the service name below. Update if the name suffix
      # differs once deployed, or once a custom domain is attached.
      - key: ALLOWED_HOSTS
        value: medrisk-api.onrender.com
      # CORS_ORIGINS is the allowed *caller* origin (the frontend), not this API's own
      # domain - left empty until a frontend is actually deployed somewhere. Same-origin
      # use (e.g. /docs Swagger UI) doesn't need CORS at all.
      - key: CORS_ORIGINS
        value: ""

      # --- Histopathology model deployment ---
      # No model bundle ships in this image (see Dockerfile) - MODEL_REQUIRED=false so the
      # app starts and serves everything except real inference. Do not set
      # ALLOW_SYNTHETIC_MODEL=true here: ENVIRONMENT=development already allows it
      # implicitly if a bundle is later configured, but the only bundle in this repository
      # remains synthetic-only and must never be reachable from a public deployment without
      # a deliberate, documented decision (see docs/DEPLOYMENT.md).
      - key: MODEL_REQUIRED
        value: "false"
