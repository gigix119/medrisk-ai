# Fast, fully synthetic pipeline-validation run.
# Purpose: prove the pipeline works end to end (data -> model -> training -> checkpoint ->
# evaluation -> calibration -> Grad-CAM -> bundle), on CPU, in well under a minute.
# This is NOT a medical experiment and its metrics have no clinical meaning - see
# docs/dataset-card-pcam.md and the SYNTHETIC DATA warnings printed by the CLI.

experiment:
  name: smoke-baseline-cnn
  description: "Synthetic pipeline-validation run. NOT a medical experiment."
  seed: 42
  output_dir: artifacts/experiments
  tags: [smoke, synthetic, ci]

data:
  dataset_name: synthetic
  data_dir: data/external/pcam
  download: false
  synthetic: true
  smoke_mode: true
  train_subset_size: 64
  validation_subset_size: 32
  test_subset_size: 32
  image_size: 96
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null

model:
  architecture: baseline_cnn
  pretrained: false
  num_classes: 1
  dropout: 0.3
  freeze_backbone: false
  unfreeze_from_layer: null

training:
  epochs: 2
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: adamw
  scheduler: none
  warmup_epochs: 0
  mixed_precision: false
  gradient_clip_norm: 1.0
  accumulation_steps: 1
  early_stopping_patience: 5
  monitored_metric: roc_auc
  monitored_mode: max

evaluation:
  default_threshold: 0.5
  threshold_strategy: max_f1
  calibration: true
  bootstrap_samples: 20
  confidence_level: 0.95

logging:
  log_level: INFO
  tensorboard: true
  save_predictions: true

runtime:
  device: auto
  deterministic: true
  benchmark: false
