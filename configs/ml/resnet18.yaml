# ResNet18 transfer learning on the REAL PatchCamelyon (PCam) dataset - Stage A
# (frozen backbone, train the classifier head only). Requires PCam already downloaded.
# Not auto-executed. For Stage B fine-tuning, re-run with overrides, e.g.:
#   --set model.freeze_backbone=false --set model.unfreeze_from_layer=layer4 \
#   --set training.learning_rate=0.00005
# See docs/experiment-protocol.md for the full staged-training rationale.

experiment:
  name: resnet18-transfer-pcam
  description: "ResNet18 transfer learning on real PatchCamelyon (PCam): frozen-backbone stage A."
  seed: 42
  output_dir: artifacts/experiments
  tags: [resnet18, pcam, transfer_learning, stage_a]

data:
  dataset_name: pcam
  data_dir: data/external/pcam
  download: false
  synthetic: false
  smoke_mode: false
  train_subset_size: null
  validation_subset_size: null
  test_subset_size: null
  image_size: 96
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  architecture: resnet18
  pretrained: true
  num_classes: 1
  dropout: 0.2
  freeze_backbone: true
  unfreeze_from_layer: null

training:
  epochs: 15
  batch_size: 64
  learning_rate: 0.0005
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 1
  mixed_precision: true
  gradient_clip_norm: 1.0
  accumulation_steps: 1
  early_stopping_patience: 5
  monitored_metric: roc_auc
  monitored_mode: max

evaluation:
  default_threshold: 0.5
  threshold_strategy: youden_j
  calibration: true
  bootstrap_samples: 1000
  confidence_level: 0.95

logging:
  log_level: INFO
  tensorboard: true
  save_predictions: true

runtime:
  device: auto
  deterministic: false
  benchmark: true
