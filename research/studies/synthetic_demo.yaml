# Synthetic pipeline-demonstration study (Phase 7).
#
# This study targets the ONLY data and model currently available in this repository: the
# fully synthetic "Synthetic Histopathology Demonstration Dataset" (seeded by
# scripts/seed_dataset.py from medrisk_ml.data.synthetic.SyntheticHistopathologyDataset,
# seed=42) and the "smoke-baseline-cnn:0.0.1-smoke" registry bundle trained on the same
# generator via configs/ml/smoke.yaml. It exists to demonstrate the research-evaluation
# pipeline end to end - it is NOT a medical experiment and its numbers carry no clinical
# meaning. See governance.scientific_maturity below and docs/PHASE_7_PROGRESS.md.

slug: synthetic-pipeline-demo
title: "Synthetic pipeline demonstration: baseline CNN on generated histopathology patches"
short_description: >
  End-to-end demonstration of the research evaluation pipeline (dataset registry -> model ->
  deterministic evaluation -> metrics/calibration/bootstrap CI -> persisted research record)
  using only synthetic, procedurally generated data.
research_question: >
  Does the full research-evaluation pipeline (dataset resolution, deterministic inference,
  metrics computation with explicit undefined-value handling, calibration, bootstrap
  confidence intervals, and persistence) run correctly end to end on a small, fully
  controlled synthetic dataset?
hypothesis: >
  No clinical hypothesis is being tested. The only claim under test is engineering
  correctness of the pipeline itself.
author: "MedRisk AI project (automated ingestion, Phase 7)"

dataset:
  dataset_slug: synthetic-histopathology-demo
  dataset_version: "1.0.0"
  provenance_classification: synthetic
  task_type: binary_classification
  target_classes: ["negative", "positive"]
  positive_class: positive
  negative_class: negative
  inclusion_rules: "All samples generated by SyntheticHistopathologyDataset(seed=42)."
  exclusion_rules: "None - no exclusion mechanism exists for this dataset."
  split_strategy: predefined
  train_split: train
  validation_split: val
  test_split: test
  grouping_identifier: null
  random_seed: 42

preprocessing:
  input_width: 96
  input_height: 96
  color_mode: rgb
  normalization_strategy: per_dataset_mean_std
  normalization_stats_source: "Computed from the training split at experiment time (see model manifest)."
  interpolation_method: null
  preprocessing_version: "1.0.0"
  augmentation_enabled_for_training: false

training:
  architecture: baseline_cnn
  architecture_version: null
  pretrained_weights_source: null
  loss_function: binary_cross_entropy
  class_weighting: null
  optimizer: adamw
  learning_rate: 0.001
  scheduler: none
  batch_size: 16
  epochs: 2
  early_stopping_patience: 5
  checkpoint_selection_metric: roc_auc
  checkpoint_selection_direction: max
  mixed_precision: false
  seed: 42
  deterministic: true

evaluation:
  evaluation_split: test
  primary_metric: roc_auc
  secondary_metrics: [pr_auc, sensitivity, specificity, f1, accuracy, brier_score]
  confidence_level: 0.95
  bootstrap_iterations: 20
  bootstrap_seed: 42
  calibration_enabled: true
  calibration_fit_split: val
  threshold_strategy: max_f1
  threshold_fit_split: val

governance:
  intended_use: >
    Demonstrating the dataset-driven research inference and evaluation flow (dataset ->
    sample -> ground truth -> prediction -> metrics -> calibration -> bootstrap CI ->
    persisted research record) for engineering review.
  out_of_scope_use: >
    Must not be cited, represented, or used as evidence of real histopathology model
    performance, for medical research, diagnosis, or any clinical purpose.
  known_limitations: >
    Images are procedurally generated noise patterns, not real tissue. Model performance on
    this dataset says nothing about performance on real histopathology data. The smoke
    training run (configs/ml/smoke.yaml) used a different per-split sample count (64/32/32)
    than the web-facing dataset registry seed (30/10/10) - both come from the same
    deterministic generator, but only the first 10 test-split sample keys overlap exactly;
    see docs/PHASE_7_PROGRESS.md for how this is handled honestly in ingestion.
  ethical_considerations: >
    No human subjects, patient data, or biological material of any kind was used. The
    dataset exists solely to exercise the pipeline safely.
  license_notes: "Project-internal synthetic data; no external license applies."
  citation_references: ["pytorch", "scikit-learn", "gradcam-selvaraju-2017"]
  scientific_maturity: synthetic_demo
