# Structured references registry (Phase 7, master-spec section 28).
#
# Every entry below was checked against a live web search on 2026-06-25 (titles, authors,
# venue, year, and DOI/identifier cross-referenced against at least two independent sources -
# the official venue page or GitHub repo, plus dblp/ACM/Springer) before being marked
# `verification_status: verified`. Nothing here is invented: no entry exists for a reference
# that wasn't actually checked, and any future addition that can't be verified this way must
# be added with `verification_status: unverified` or `missing`, never silently as "verified".
#
# Model cards, dataset cards and research reports (Phase 7) resolve citations from this file
# by `id` - see app.research.domain (future: a typed loader) and docs/PHASE_7_PROGRESS.md.

